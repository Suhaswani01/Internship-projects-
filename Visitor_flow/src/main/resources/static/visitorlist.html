<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { display: flex; background: linear-gradient(120deg, #eef2ff, #f8fafc); color: #1e293b; }
    html, body { height: 100%; overflow: hidden; }

    .sidebar {
      width: 240px; background-color: #143E6B; color: white;
      display: flex; flex-direction: column; padding: 17px;
      height: 100vh; overflow: hidden;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .logo-cloud { background: rgba(255,255,255,0.2); padding: 6px; border-radius: 8px; }
    .nav { margin-top: 60px; flex-grow: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      margin: 8px 0; border-radius: 17px; color: #1b0c0c;
      text-decoration: none; transition: 0.3s;
      background-color: #ffffff; border: 2px solid #bacacd;
    }
    .nav-item:hover, .nav-item.active { background: rgba(244,216,216,0.2); color: white; }
    .sidebar-footer { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; }
    .sidebar-footer:hover { background: rgba(255,255,255,0.05); }
    .user-avatar {
      background: white; color: #1e3a8a; font-weight: bold;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0;
    }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-size: 14px; color: white; font-weight: 600; }
    .user-role { font-size: 12px; opacity: 0.7; color: white; }

    .main { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      height: 70px; background-color: #143E6B; padding: 0 24px; flex-shrink: 0;
    }
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    .icon-btn {
      background: rgba(255,255,255,0.15); border: none; border-radius: 10px;
      padding: 8px; cursor: pointer; color: white; display: flex; align-items: center;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.25); }
    .notif { position: relative; }
    .badge {
      position: absolute; top: -4px; right: -4px;
      background: #ef4444; color: white; font-size: 10px;
      font-weight: 700; border-radius: 50%; width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .bottom-grid { flex: 1; overflow: hidden; display: flex; margin: 20px 10px; }
    .table-card {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: white; padding: 20px; border-radius: 15px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .card-header h3 { font-size: 16px; font-weight: 700; color: #1e293b; }
    .table-wrap { flex: 1; overflow-y: auto; overflow-x: auto; }

    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-wrap svg { position: absolute; left: 10px; color: #94a3b8; pointer-events: none; }
    .search-input {
      padding: 8px 12px 8px 34px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 13px; font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none; width: 210px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #143E6B; }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 12px; text-align: left; font-size: 13px;
      font-weight: 600; color: #64748b; background: #f8fafc;
      border-bottom: 2px solid #e2e8f0; white-space: nowrap;
    }
    td { padding: 10px 12px; text-align: left; font-size: 13px; }
    tbody tr { border-top: 1px solid #eee; transition: background 0.15s; }
    tbody tr:hover { background: #f8fafc; }

    .person { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .av {
      width: 35px; height: 35px; border-radius: 50%; color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 13px; flex-shrink: 0;
    }
    .av1 { background: #3b82f6; } .av2 { background: #22c55e; }
    .av3 { background: #f97316; } .av4 { background: #ef4444; }
    .av5 { background: #6366f1; } .av6 { background: #d946ef; }

    .status-badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; white-space: nowrap;
    }
    .status-pending     { background: #fef9c3; color: #854d0e; }
    .status-approved    { background: #dcfce7; color: #166534; }
    .status-rejected    { background: #fee2e2; color: #991b1b; }
    .status-checked_in  { background: #dbeafe; color: #1e40af; }
    .status-checked_out { background: #f1f5f9; color: #475569; }

    .pagination {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 4px; border-top: 1px solid #eee; flex-shrink: 0;
    }
    .page-info { font-size: 13px; color: #64748b; }
    .page-info span { font-weight: 600; color: #1e293b; }
    .page-btns { display: flex; gap: 6px; align-items: center; }
    .page-btn {
      min-width: 34px; height: 34px; border: 1.5px solid #e2e8f0; background: white;
      border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s; color: #475569;
    }
    .page-btn:hover:not(:disabled) { border-color: #143E6B; color: #143E6B; }
    .page-btn.active { background: #143E6B; color: white; border-color: #143E6B; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .no-results { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 10px; font-size: 13px;
      font-weight: 600; color: white; z-index: 9999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    @media (max-width: 1200px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }
      tbody tr { margin-bottom: 15px; border-top: 1px solid #ddd; padding: 10px; }
      td { display: flex; justify-content: space-between; padding: 6px 0; }
      td::before { content: attr(data-label); font-weight: bold; flex-basis: 40%; }
    }
    


  </style>
</head>

<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-cloud">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
          <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
        </svg>
      </div>
      <span>VMS</span>
    </div>

    <nav class="nav">
      <a href="overview.html" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Overview
      </a>
      <a href="visitorlist.html" class="nav-item active">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Visitors List
      </a>
      <a href="report.html" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Reports
      </a>
    </nav>

    <!-- Sidebar footer ke NEECHE add karo -->
<div class="sidebar-footer" id="profileBtn">
  <div class="user-avatar" id="userAvatar">--</div>
  <div class="user-info">
    <span class="user-name" id="userName">Loading...</span>
    <span class="user-role" id="userRole">--</span>
  </div>
</div>

<!-- ✅ SIRF YEH ADD KARO -->
<button class="logout-btn" onclick="logout()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16 17 21 12 16 7"/>
    <line x1="21" y1="12" x2="9" y2="12"/>
  </svg>
  Logout
</button>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-left"></div>
      <div class="topbar-right">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </button>
        <button class="icon-btn notif">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge">3</span>
        </button>
      </div>
    </header>

    <div class="bottom-grid">
      <div class="table-card">

        <div class="card-header">
          <h3>Pending Visitors</h3>
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="search-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="searchInput" class="search-input" placeholder="Search by name or ID…">
            </div>
            <a href="add.html" class="nav-item" style="white-space:nowrap;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              Add Visitor
            </a>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th><th>ID</th><th>Email</th><th>Department</th>
                <th>Purpose</th><th>Age</th><th>Phone</th><th>Gender</th>
                <th>Address</th><th>Due Date</th><th>Status</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="no-results" id="noResults" style="display:none">No pending visitors found.</div>
        </div>

        <div class="pagination" id="pagination" style="display:none">
          <div class="page-info" id="pageInfo"></div>
          <div class="page-btns" id="pageBtns"></div>
        </div>

      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const ROWS_PER_PAGE  = 10;
    let allVisitors      = [];
    let filteredVisitors = [];
    let currentPage      = 1;

    document.addEventListener('DOMContentLoaded', () => {

      // ✅ STEP 1 — sessionStorage se naam aur role lo
      const name = sessionStorage.getItem('name') || 'User';
      const role = sessionStorage.getItem('role') || 'ADMIN';

      // ✅ STEP 2 — Sidebar mein update karo
      document.getElementById('userName').textContent = name;
      document.getElementById('userRole').textContent = role;

      // ✅ STEP 3 — Avatar initials (pehle 2 letters)
      const initials = name.trim().split(' ')
        .map(n => n[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('userAvatar').textContent = initials;

      // ✅ STEP 4 — Visitors fetch karo
      fetch('/visitors/pending')
        .then(res => res.json())
        .then(data => {
          allVisitors      = data;
          filteredVisitors = data;
          render();
        })
        .catch(err => console.error('Fetch error:', err));
    });

    // ── Search ──
    document.getElementById('searchInput').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      filteredVisitors = q
        ? allVisitors.filter(v =>
            v.name.toLowerCase().includes(q) ||
            String(v.id).includes(q) ||
            `ad${v.id}`.toLowerCase().includes(q)
          )
        : allVisitors;
      currentPage = 1;
      render();
    });

    // ── Render ──
    function render() {
      const tbody    = document.getElementById('tableBody');
      const noRes    = document.getElementById('noResults');
      const pagDiv   = document.getElementById('pagination');
      const total    = filteredVisitors.length;
      const totalPgs = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));

      if (currentPage > totalPgs) currentPage = totalPgs;

      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const slice = filteredVisitors.slice(start, start + ROWS_PER_PAGE);

      tbody.innerHTML = '';

      if (slice.length === 0) {
        noRes.style.display = '';
        pagDiv.style.display = 'none';
        return;
      }

      noRes.style.display = 'none';
      pagDiv.style.display = '';

      slice.forEach((v, i) => {
        const avClass  = `av${((start + i) % 6) + 1}`;
        const initials = v.name.split(' ').map(n => n[0]).join('').toUpperCase();
        const status   = v.status || 'PENDING';
        const tr       = document.createElement('tr');
        tr.innerHTML = `
          <td data-label="Name">
            <div class="person">
              <div class="av ${avClass}">${initials}</div>
              ${v.name}
            </div>
          </td>
          <td data-label="ID">AD${v.id}</td>
          <td data-label="Email">${v.email || '-'}</td>
          <td data-label="Department">${v.department || '-'}</td>
          <td data-label="Purpose">${v.purpose || '-'}</td>
          <td data-label="Age">${v.age || '-'}</td>
          <td data-label="Phone">${v.phone ?? '-'}</td>
          <td data-label="Gender">${v.gender || '-'}</td>
          <td data-label="Address">${v.address || '-'}</td>
          <td data-label="Due Date">${v.dueDate ?? '-'}</td>
          <td data-label="Status">
            <span class="status-badge status-${status.toLowerCase()}">${status}</span>
          </td>
        `;
        tbody.appendChild(tr);
      });

      renderPagination(total, totalPgs);
    }

    function renderPagination(total, totalPgs) {
      const start = (currentPage - 1) * ROWS_PER_PAGE + 1;
      const end   = Math.min(currentPage * ROWS_PER_PAGE, total);

      document.getElementById('pageInfo').innerHTML =
        `Showing <span>${start}–${end}</span> of <span>${total}</span> visitors`;

      const btns = document.getElementById('pageBtns');
      btns.innerHTML = '';
      btns.appendChild(mkBtn('‹', currentPage === 1, () => { currentPage--; render(); }));

      getPages(currentPage, totalPgs).forEach(p => {
        if (p === '…') {
          const el = document.createElement('span');
          el.textContent = '…';
          el.style.cssText = 'padding:0 4px;color:#94a3b8;font-size:13px;';
          btns.appendChild(el);
        } else {
          const el = mkBtn(p, false, () => { currentPage = p; render(); });
          if (p === currentPage) el.classList.add('active');
          btns.appendChild(el);
        }
      });

      btns.appendChild(mkBtn('›', currentPage === totalPgs, () => { currentPage++; render(); }));
    }

    function mkBtn(label, disabled, onClick) {
      const b = document.createElement('button');
      b.className   = 'page-btn';
      b.textContent = label;
      b.disabled    = disabled;
      if (!disabled) b.addEventListener('click', onClick);
      return b;
    }

    function getPages(cur, total) {
      if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
      if (cur <= 4)         return [1, 2, 3, 4, 5, '…', total];
      if (cur >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
      return [1, '…', cur-1, cur, cur+1, '…', total];
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }
    
    function logout() {
  sessionStorage.clear();
  window.location.href = 'login.html';
}
  </script>
   <script src="profile-modal.js"></script>

</body>
</html>
