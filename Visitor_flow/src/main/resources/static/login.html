<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VMS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: #143E6B;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      border-radius: 25px;
      background: rgba(230,235,245,0.95);
      backdrop-filter: blur(11px);
      border: 3px solid rgb(154,172,205);
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      animation: up .5s ease;
    }
    @keyframes up {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LOGO */
    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 18px;
    }
    .logo-icon {
      width: 42px; height: 42px; background: #143E6B;
      border-radius: 11px; display: flex; align-items: center; justify-content: center;
    }
    .logo span { font-size: 1.4rem; font-weight: 700; color: #0f172a; }

    h2 { text-align: center; font-size: 1.4rem; color: #0f172a; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 22px; }

    /* SCREENS */
    .screen { display: none; }
    .screen.active { display: block; }

    /* INPUTS */
    .input-group { margin-bottom: 14px; }
    .input-group label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    .input-group input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid #e2e8f0; background: #f8fafc;
      outline: none; font-family: 'Outfit', sans-serif; font-size: 14px; transition: 0.2s;
    }
    .input-group input:focus {
      border-color: #143E6B;
      box-shadow: 0 0 0 3px rgba(20,62,107,0.15);
      background: white;
    }

    /* PASSWORD */
    .password-box { position: relative; }
    .password-box input { padding-right: 42px; }
    .toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); cursor: pointer; font-size: 16px; user-select: none;
    }

    /* OTP BOXES */
    .otp-boxes { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
    .otp-boxes input {
      width: 48px; height: 54px; text-align: center; font-size: 22px; font-weight: 700;
      border-radius: 10px; border: 1.5px solid #e2e8f0; background: #f8fafc;
      outline: none; font-family: 'Outfit', sans-serif; transition: 0.2s;
    }
    .otp-boxes input:focus {
      border-color: #143E6B;
      box-shadow: 0 0 0 3px rgba(20,62,107,0.15);
      background: white;
    }

    /* BUTTONS */
    .btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: #143E6B; color: white; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: 0.3s; font-family: 'Outfit', sans-serif;
    }
    .btn:hover { background: #0f2d52; transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

    .btn-outline {
      width: 100%; padding: 11px; border-radius: 10px;
      border: 1.5px solid #143E6B; background: transparent; color: #143E6B;
      font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s;
      font-family: 'Outfit', sans-serif; margin-top: 10px;
    }
    .btn-outline:hover { background: #143E6B; color: white; }

    /* ALERTS */
    .alert {
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      font-weight: 600; margin-bottom: 14px; text-align: center; display: none;
    }
    .alert.show   { display: block; }
    .alert.error  { background: #fee2e2; color: #dc2626; }
    .alert.success{ background: #dcfce7; color: #16a34a; }

    /* FORGOT LINK */
    .forgot-row { text-align: right; margin-bottom: 16px; }
    .forgot-row a { font-size: 13px; color: #143E6B; font-weight: 600; cursor: pointer; }

    /* STEP DOTS */
    .steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 22px; }
    .step { width: 28px; height: 5px; border-radius: 3px; background: #e2e8f0; transition: 0.3s; }
    .step.active { background: #143E6B; }
    .step.done   { background: #22c55e; }

    /* TIMER */
    .timer { text-align: center; font-size: 13px; color: #64748b; margin-top: 10px; }
    .timer span { font-weight: 700; color: #143E6B; }

    /* SUCCESS */
    .success-icon {
      width: 70px; height: 70px; background: #dcfce7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 32px;
    }

    /* SPINNER */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
      </svg>
    </div>
    <span>VMS</span>
  </div>

  <!-- ══════════════════════ -->
  <!-- SCREEN 1 — LOGIN      -->
  <!-- ══════════════════════ -->
  <div class="screen active" id="screen-login">
    <h2>Welcome Back</h2>
    <p class="sub">Login to your account</p>

    <div class="alert error" id="login-error"></div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="password-box">
        <input type="password" id="login-password" placeholder="Enter your password">
        <span class="toggle" onclick="togglePass('login-password',this)">👁</span>
      </div>
    </div>

    <div class="forgot-row">
      <a onclick="showScreen('screen-forgot')">Forgot password?</a>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>

  <!-- ══════════════════════════════ -->
  <!-- SCREEN 2 — FORGOT (Email)     -->
  <!-- ══════════════════════════════ -->
  <div class="screen" id="screen-forgot">
    <h2>Forgot Password</h2>
    <p class="sub">Enter your registered email to receive OTP</p>

    <div class="steps">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <div class="alert error"   id="forgot-error"></div>
    <div class="alert success" id="forgot-success"></div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="yourmail@gmail.com">
    </div>

    <button class="btn" id="send-otp-btn" onclick="sendOtp()">Send OTP</button>
    <button class="btn-outline" onclick="showScreen('screen-login')">← Back to Login</button>
  </div>

  <!-- ══════════════════════════════ -->
  <!-- SCREEN 3 — OTP VERIFY         -->
  <!-- ══════════════════════════════ -->
  <div class="screen" id="screen-otp">
    <h2>Enter OTP</h2>
    <p class="sub" id="otp-sub">OTP sent to your email</p>

    <div class="steps">
      <div class="step done"></div>
      <div class="step active"></div>
      <div class="step"></div>
    </div>

    <div class="alert error"   id="otp-error"></div>
    <div class="alert success" id="otp-success"></div>

    <div class="otp-boxes">
      <input type="text" maxlength="1" id="o1" oninput="otpNext(this,'o2')" onkeydown="otpBack(event,this,'')">
      <input type="text" maxlength="1" id="o2" oninput="otpNext(this,'o3')" onkeydown="otpBack(event,this,'o1')">
      <input type="text" maxlength="1" id="o3" oninput="otpNext(this,'o4')" onkeydown="otpBack(event,this,'o2')">
      <input type="text" maxlength="1" id="o4" oninput="otpNext(this,'o5')" onkeydown="otpBack(event,this,'o3')">
      <input type="text" maxlength="1" id="o5" oninput="otpNext(this,'o6')" onkeydown="otpBack(event,this,'o4')">
      <input type="text" maxlength="1" id="o6" oninput="otpNext(this,'')"   onkeydown="otpBack(event,this,'o5')">
    </div>

    <div class="timer" id="timer-text">Resend OTP in <span id="countdown">60</span>s</div>

    <button class="btn" id="verify-btn" onclick="verifyOtp()" style="margin-top:16px">Verify OTP</button>
    <button class="btn-outline" onclick="showScreen('screen-forgot')">← Change Email</button>
  </div>

  <!-- ══════════════════════════════ -->
  <!-- SCREEN 4 — NEW PASSWORD       -->
  <!-- ══════════════════════════════ -->
  <div class="screen" id="screen-reset">
    <h2>New Password</h2>
    <p class="sub">Set your new password below</p>

    <div class="steps">
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step active"></div>
    </div>

    <div class="alert error"   id="reset-error"></div>
    <div class="alert success" id="reset-success"></div>

    <div class="input-group">
      <label>New Password</label>
      <div class="password-box">
        <input type="password" id="new-password" placeholder="Min 6 characters">
        <span class="toggle" onclick="togglePass('new-password',this)">👁</span>
      </div>
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <div class="password-box">
        <input type="password" id="confirm-password" placeholder="Re-enter password">
        <span class="toggle" onclick="togglePass('confirm-password',this)">👁</span>
      </div>
    </div>

    <button class="btn" id="reset-btn" onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- ══════════════════════════════ -->
  <!-- SCREEN 5 — SUCCESS            -->
  <!-- ══════════════════════════════ -->
  <div class="screen" id="screen-success">
    <div class="success-icon">✅</div>
    <h2>Password Reset!</h2>
    <p class="sub" style="margin-bottom:24px">Your password has been changed successfully.</p>
    <button class="btn" onclick="showScreen('screen-login')">Go to Login</button>
  </div>

</div>

<script>
  const API = '/auth';
  let otpEmail = '';
  let timerInterval = null;

  // ── Screen switch ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Toggle password visibility ──
  function togglePass(id, el) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  // ── Show alert ──
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ── Loading button ──
  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
  }

  // ════════════════════
  // 1. LOGIN
  // ════════════════════
  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!email || !password) {
      showAlert('login-error', '⚠️ Please enter email and password!', 'error');
      return;
    }

    setLoading('login-btn', true, 'Signing in…');
    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('login-error', '❌ ' + (data.message || 'Invalid credentials!'), 'error');
        return;
      }

      sessionStorage.setItem('role',     data.role);
      sessionStorage.setItem('email',    email);
      sessionStorage.setItem('name',  data.name)
      sessionStorage.setItem('loggedIn', 'true');

      // Role based redirect
      const routes = {
        ADMIN:    'visitorlist.html',
        HOST:     'host.html',
        SECURITY: 'security.html'
      };
      window.location.href = routes[data.role] || 'visitorlist.html';

    } catch (e) {
      showAlert('login-error', '⚠️ Server not reachable!', 'error');
    } finally {
      setLoading('login-btn', false, 'Sign In');
    }
  }

  // ════════════════════
  // 2. SEND OTP
  // ════════════════════
  async function sendOtp() {
    const email = document.getElementById('forgot-email').value.trim();

    if (!email) {
      showAlert('forgot-error', '⚠️ Please enter your email!', 'error');
      return;
    }

    setLoading('send-otp-btn', true, 'Sending OTP…');
    try {
      const res  = await fetch(`${API}/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('forgot-error', '❌ ' + (data.message || 'Email not registered!'), 'error');
        return;
      }

      otpEmail = email;
      document.getElementById('otp-sub').textContent = `OTP sent to ${email}`;
      // Clear old OTP
      ['o1','o2','o3','o4','o5','o6'].forEach(id => document.getElementById(id).value = '');
      showScreen('screen-otp');
      startTimer();
      document.getElementById('o1').focus();

    } catch (e) {
      showAlert('forgot-error', '⚠️ Server not reachable!', 'error');
    } finally {
      setLoading('send-otp-btn', false, 'Send OTP');
    }
  }

  // ── OTP Input helpers ──
  function otpNext(el, nextId) {
    el.value = el.value.replace(/[^0-9]/g, '');
    if (el.value && nextId) document.getElementById(nextId).focus();
  }
  function otpBack(e, el, prevId) {
    if (e.key === 'Backspace' && !el.value && prevId)
      document.getElementById(prevId).focus();
  }
  function getOtp() {
    return ['o1','o2','o3','o4','o5','o6']
      .map(id => document.getElementById(id).value).join('');
  }

  // ── Countdown timer ──
  function startTimer() {
    let sec = 60;
    clearInterval(timerInterval);
    document.getElementById('timer-text').innerHTML =
      `Resend OTP in <span id="countdown">60</span>s`;
    timerInterval = setInterval(() => {
      sec--;
      const el = document.getElementById('countdown');
      if (el) el.textContent = sec;
      if (sec <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timer-text').innerHTML =
          `<a style="color:#143E6B;font-weight:700;cursor:pointer" onclick="resendOtp()">🔄 Resend OTP</a>`;
      }
    }, 1000);
  }

  async function resendOtp() {
    document.getElementById('forgot-email').value = otpEmail;
    await sendOtp();
  }

  // ════════════════════
  // 3. VERIFY OTP
  // ════════════════════
  async function verifyOtp() {
    const otp = getOtp();
    if (otp.length < 6) {
      showAlert('otp-error', '⚠️ Please enter complete 6-digit OTP!', 'error');
      return;
    }

    setLoading('verify-btn', true, 'Verifying…');
    try {
      const res  = await fetch(`${API}/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: otpEmail, otp })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('otp-error', '❌ ' + (data.message || 'Invalid or expired OTP!'), 'error');
        return;
      }

      clearInterval(timerInterval);
      showScreen('screen-reset');

    } catch (e) {
      showAlert('otp-error', '⚠️ Server not reachable!', 'error');
    } finally {
      setLoading('verify-btn', false, 'Verify OTP');
    }
  }

  // ════════════════════
  // 4. RESET PASSWORD
  // ════════════════════
  async function resetPassword() {
    const newPass     = document.getElementById('new-password').value.trim();
    const confirmPass = document.getElementById('confirm-password').value.trim();

    if (!newPass || !confirmPass) {
      showAlert('reset-error', '⚠️ Please fill both fields!', 'error');
      return;
    }
    if (newPass.length < 6) {
      showAlert('reset-error', '⚠️ Password must be at least 6 characters!', 'error');
      return;
    }
    if (newPass !== confirmPass) {
      showAlert('reset-error', '❌ Passwords do not match!', 'error');
      return;
    }

    setLoading('reset-btn', true, 'Resetting…');
    try {
      const res  = await fetch(`${API}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: otpEmail, newPassword: newPass })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('reset-error', '❌ ' + (data.message || 'Reset failed!'), 'error');
        return;
      }

      showScreen('screen-success');

    } catch (e) {
      showAlert('reset-error', '⚠️ Server not reachable!', 'error');
    } finally {
      setLoading('reset-btn', false, 'Reset Password');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.screen.active').id;
    if (active === 'screen-login')  doLogin();
    if (active === 'screen-forgot') sendOtp();
    if (active === 'screen-otp')    verifyOtp();
    if (active === 'screen-reset')  resetPassword();
  });
  

</script>
</body>
</html>
